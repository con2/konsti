name: deploy
run-name: deploy-${{ github.event_name == 'push' && 'staging' || inputs.environment }}

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        type: choice
        options:
          - staging
          - prod
        default: prod

env:
  SKAFFOLD_DEFAULT_REPO: ghcr.io/con2
  # Push to main auto-deploys staging, workflow_dispatch uses selected environment
  DEPLOY_ENV: ${{ github.event_name == 'push' && 'staging' || inputs.environment }}

jobs:
  build:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ghcr.io/con2/konsti:${{ github.sha }}
          build-args: |
            env=${{ env.DEPLOY_ENV }}

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: qb-arc-runners
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Cache skaffold
        id: cache-skaffold
        uses: actions/cache@v5
        with:
          path: bin/skaffold
          key: ${{ runner.os }}-skaffold-v2.18.2
      - name: Download skaffold
        if: steps.cache-skaffold.outputs.cache-hit != 'true'
        run: |
          mkdir -p bin
          curl -Lo bin/skaffold https://storage.googleapis.com/skaffold/releases/v2.18.2/skaffold-linux-amd64
          chmod +x bin/skaffold
      - name: Cache kubectl
        id: cache-kubectl
        uses: actions/cache@v5
        with:
          path: bin/kubectl
          key: ${{ runner.os }}-kubectl-v1.22.0
      - name: Download kubectl
        if: steps.cache-kubectl.outputs.cache-hit != 'true'
        run: |
          mkdir -p bin
          curl -Lo bin/kubectl https://dl.k8s.io/release/v1.22.0/bin/linux/amd64/kubectl
          chmod +x bin/kubectl
      - name: Add skaffold and kubectl to PATH
        run: echo "$PWD/bin" >> "$GITHUB_PATH"
      - name: Disable skaffold telemetry
        run: skaffold config set --global collect-metrics false
      - name: Deploy with skaffold
        env:
          SKAFFOLD_ENV: ${{ env.DEPLOY_ENV == 'prod' && 'production' || env.DEPLOY_ENV }}
        run: |
          python3 -m pip install setuptools emskaffolden
          emskaffolden -E "$SKAFFOLD_ENV" \
            -- deploy -n "konsti-$SKAFFOLD_ENV" \
            --images "konsti=ghcr.io/con2/konsti:${{ github.sha }}"

  sentry-release:
    needs: deploy
    if: github.ref == 'refs/heads/main'

    runs-on: ubuntu-24.04

    env:
      CI: true
      HUSKY: 0

    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Use Node.js 24.14.1
        uses: actions/setup-node@v6
        with:
          node-version: 24.14.1
          cache: "yarn"

      - name: Yarn install
        run: |
          yarn --immutable

      - name: Build frontend
        run: |
          yarn build-front:${{ env.DEPLOY_ENV }}

      - name: Create frontend Sentry release
        uses: getsentry/action-release@v3
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: konsti
          SENTRY_PROJECT: konsti-frontend-${{ env.DEPLOY_ENV }}
        with:
          sourcemaps: "./client/build"
          ignore_missing: true
          ignore_empty: true

      - name: Create backend Sentry release
        uses: getsentry/action-release@v3
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: konsti
          SENTRY_PROJECT: konsti-backend-${{ env.DEPLOY_ENV }}
        with:
          ignore_missing: true
          ignore_empty: true

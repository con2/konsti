name: Build

permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-24.04

    env:
      CI: true
      HUSKY: 0

    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set actionlint Problem Matchers
        run: |
          echo "::add-matcher::.github/actionlint-matcher.json"
        shell: bash

      - name: Run actionlint
        uses: docker://rhysd/actionlint:1.7.12
        with:
          args: -color

      - name: Use Node.js 24.14.1
        uses: actions/setup-node@v6
        with:
          node-version: 24.14.1
          cache: "yarn"

      - name: Yarn install
        run: |
          YARN_ENABLE_HARDENED_MODE=1 yarn --immutable

      - name: Restore lint caches
        uses: actions/cache@v5
        with:
          path: |
            client/.eslintcache
            server/.eslintcache
            client/.stylelintcache
            node_modules/.cache/prettier
            node_modules/.cache/knip
          key: lint-${{ runner.os }}-${{ hashFiles('eslint.config.ts', 'yarn.lock') }}-${{ github.sha }}
          restore-keys: |
            lint-${{ runner.os }}-${{ hashFiles('eslint.config.ts', 'yarn.lock') }}-

      - name: Run Prettier
        run: |
          yarn prettier:check

      - name: Run ESLint
        run: |
          yarn eslint

      - name: Run Knip
        run: |
          yarn knip

      - name: Run stylelint
        run: |
          yarn stylelint

  type-check:
    runs-on: ubuntu-24.04

    env:
      CI: true
      HUSKY: 0

    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Use Node.js 24.14.1
        uses: actions/setup-node@v6
        with:
          node-version: 24.14.1
          cache: "yarn"

      - name: Yarn install
        run: |
          YARN_ENABLE_HARDENED_MODE=1 yarn --immutable

      - name: Restore TypeScript build info cache
        uses: actions/cache@v5
        with:
          path: |
            client/node_modules/.cache/tsbuildinfo
            server/node_modules/.cache/tsbuildinfo
          key: tsbuildinfo-${{ runner.os }}-${{ hashFiles('tsconfig.json', 'client/tsconfig.json', 'server/tsconfig.json', 'yarn.lock') }}-${{ github.sha }}
          restore-keys: |
            tsbuildinfo-${{ runner.os }}-${{ hashFiles('tsconfig.json', 'client/tsconfig.json', 'server/tsconfig.json', 'yarn.lock') }}-

      - name: TS type check
        run: |
          yarn type-check

  build-and-test:
    runs-on: ubuntu-24.04

    env:
      CI: true
      HUSKY: 0

    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Use Node.js 24.14.1
        uses: actions/setup-node@v6
        with:
          node-version: 24.14.1
          cache: "yarn"

      - name: Yarn install
        run: |
          YARN_ENABLE_HARDENED_MODE=1 yarn --immutable

      - name: Build front-end
        run: |
          yarn build-front:prod

      - name: Cache MongoDB binary
        uses: actions/cache@v5
        with:
          path: ~/.cache/mongodb-binaries
          key: mongodb-8.0.11

      - name: Run Vitest tests
        run: |
          yarn test

  e2e:
    runs-on: ubuntu-24.04

    env:
      CI: true
      HUSKY: 0

    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Use Node.js 24.14.1
        uses: actions/setup-node@v6
        with:
          node-version: 24.14.1
          cache: "yarn"

      - name: Yarn install
        run: |
          YARN_ENABLE_HARDENED_MODE=1 yarn --immutable

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build app Docker image
        run: |
          docker buildx build . \
            --file Dockerfile \
            --build-arg env=ci \
            --tag server \
            --load \
            --cache-from type=gha \
            --cache-to type=gha,mode=max

      - name: Run Playwright tests
        run: |
          yarn docker-compose:run-e2e

      - name: Upload test results if Playwright tests failed
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-videos
          path: playwright/test-results/

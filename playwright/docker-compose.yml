services:
  playwright:
    build:
      context: ../ # In relation to root level docker-compose.yml file
      dockerfile: ./playwright/Dockerfile
      args:
        PLAYWRIGHT_VERSION: ${PLAYWRIGHT_VERSION}
    environment:
      - PLAYWRIGHT_BASEURL=http://server:5000
      - CI=true
      - PLAYWRIGHT_SHARD=${PLAYWRIGHT_SHARD:-} # e.g. "1/4"; empty runs the whole suite
    depends_on:
      - server
    volumes:
      - ../playwright/test-results:/usr/src/app/playwright/test-results # In relation to root level docker-compose.yml file
    # $$ escapes docker-compose interpolation so the shard flag is evaluated by the container shell
    entrypoint: /bin/sh -c "/usr/local/bin/waitforit -address=server:5000 -timeout=60 && npx playwright test --config ./playwright/playwright.config.ts $${PLAYWRIGHT_SHARD:+--shard=$$PLAYWRIGHT_SHARD}"
